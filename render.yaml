# Render blueprint for SoilConnect (single web service).
# One service builds the React frontend and serves it together with the Express
# API. Import this repo on render.com and it will pick this up automatically.
#
# NOTE: the persistent disk below keeps the JSON datastore across restarts and
# redeploys. Disks require a paid instance type (the free plan has an ephemeral
# filesystem that wipes data on every deploy). For a tiny free-plan beta you can
# remove the `disk:` block and DATA_DIR — just know data resets on redeploy
# until we move to Postgres (Phase 1).

services:
  - type: web
    name: soilconnect
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: soilconnect-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Beta: auto-verify users until real SMTP is wired (flip to "true" after).
      - key: REQUIRE_VERIFICATION
        value: "false"
      # Persist the JSON store on the mounted disk above.
      - key: DATA_DIR
        value: /data
      # Public URL of the deployed app — used in verification/reset email links.
      # Set this to your Render URL (e.g. https://soilconnect.onrender.com) in
      # the dashboard after the first deploy, or here once you know it.
      - key: APP_URL
        sync: false
      # SMTP — set these in the dashboard when you have a mail provider. Leaving
      # them unset keeps email in test mode (links returned in API responses).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
