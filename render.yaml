# Render blueprint for SoilConnect (single web service).
# One service builds the React frontend and serves it together with the Express
# API. Import this repo on render.com and Render reads this file automatically.
#
# DEFAULT = FREE ($0). The free plan is great for a first beta but has two limits:
#   1) the service "sleeps" after ~15 min of no traffic, so the first visit after
#      idle takes ~30-60s to wake up (then it's fast again);
#   2) no permanent storage — the JSON datastore resets on every redeploy.
#      Fine for kicking the tires; not for real customer data yet.
#
# TO UPGRADE LATER (always-on + data that survives redeploys), in the Render
# dashboard change the instance type to "Starter" (about $7/month) and add a
# disk mounted at /data, then set DATA_DIR=/data. No file editing required.

services:
  - type: web
    name: soilconnect
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Beta: auto-verify users until real SMTP is wired (flip to "true" after).
      - key: REQUIRE_VERIFICATION
        value: "false"
      # Public URL of the deployed app — used in verification/reset email links.
      # Set this in the dashboard to your Render URL after the first deploy
      # (e.g. https://soilconnect.onrender.com).
      - key: APP_URL
        sync: false
      # SMTP — leave unset to keep email in test mode (links returned in API
      # responses). Set these in the dashboard when you have a mail provider.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
